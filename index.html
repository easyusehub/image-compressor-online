<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EasyUseHub - Pro Image Compressor</title>
<style>
body{font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:#f4f7f6; margin:0; padding:10px; text-align:center; color:#1e293b;}
.container{max-width:450px; margin:10px auto; background:#fff; padding:25px; border-radius:20px; box-shadow:0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e2e8f0;}
header img{max-width:150px; margin-bottom:10px;}

.tool-title {font-size: 24px; font-weight: 800; color: #1e293b; margin: 10px 0;}
.tool-title span {color: #3b82f6;}

.ad-slot{margin:15px auto; padding:10px; background:#f1f5f9; border:1px dashed #cbd5e1; border-radius:10px; font-size:12px; color:#94a3b8;}
.description {font-size: 13px; color: #64748b; line-height: 1.5; margin-bottom: 15px;}

.upload-area{border:2px dashed #3b82f6; padding:30px; border-radius:15px; cursor:pointer; background:#f0f7ff; margin-bottom:20px;}
.upload-btn{background:#3b82f6; color:#fff; padding:10px 20px; border-radius:8px; font-weight:bold; display:inline-block; margin-bottom:10px;}

.stats-container {display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; display: none;}
.stat-box {background: #f8fafc; padding: 10px; border-radius: 10px; border: 1px solid #e2e8f0; font-size: 13px; text-align: left;}
.stat-box b {display: block; font-size: 11px; color: #64748b; text-transform: uppercase;}

.btn{width:100%; padding:15px; background:#22c55e; color:#fff; border:none; border-radius:12px; font-size:18px; font-weight:bold; cursor:pointer; margin-top:10px;}
select{width:100%; padding:12px; margin:10px 0; border-radius:10px; border:2px solid #e2e8f0; font-size:16px; outline:none;}

#progress-container{display:none; margin:20px 0; text-align:left;}
.progress-label{font-size:12px; font-weight:bold; color:#3b82f6; margin-bottom:5px; display:block;}
.progress-bg{width:100%; height:8px; background:#e2e8f0; border-radius:10px; overflow:hidden;}
.progress-fill{width:0%; height:100%; background:#22c55e; transition: width 0.3s ease;}

#preview img{max-width:140px; border-radius:12px; margin-top:15px; border:1px solid #ddd;}
.download-btn{display:block; margin-top:15px; background:#1e293b; color:#fff; padding:15px; border-radius:10px; text-decoration:none; font-weight:bold;}
.home-btn{display:inline-block; margin-top:20px; color:#3b82f6; text-decoration:none; font-weight:bold; font-size:14px;}
</style>
</head>
<body>

<div class="ad-slot">ADVERTISEMENT SLOT (TOP)</div>

<div class="container">
    <header><img src="https://i.ibb.co.com/21CVbgH5/1000036310-removebg-preview-1.png" alt="EasyUseHub"></header>
    
    <h1 class="tool-title">Image <span>Compressor</span></h1>
    <p class="description">Optimized for Large Files (Up to 15MB). Secure & Fast.</p>
    
    <div class="upload-area" onclick="document.getElementById('fileInp').click()">
        <span class="upload-btn">Select Photo</span>
        <input type="file" id="fileInp" accept="image/*" style="display:none">
        <div id="status" style="font-size:13px; color:#64748b;">Max 15MB | JPG, PNG, WebP</div>
    </div>

    <div id="stats-box" class="stats-container">
        <div class="stat-box"><b>Original Size</b> <span id="oldS" style="color:#ef4444; font-weight:bold;">0 KB</span></div>
        <div class="stat-box"><b>New Size</b> <span id="newS" style="color:#22c55e; font-weight:bold;">-</span></div>
    </div>

    <label style="display:block; text-align:left; font-weight:bold; font-size:14px; color:#475569;">Target Size:</label>
    <select id="targetKB">
        <option value="50">50 KB</option>
        <option value="100" selected>100 KB</option>
        <option value="200">200 KB</option>
        <option value="500">500 KB</option>
        <option value="1024">1 MB</option>
    </select>

    <button id="runBtn" class="btn" style="display:none;" onclick="processImage()">⚡ Optimize Image</button>

    <div id="progress-container">
        <span class="progress-label" id="p-label">Starting...</span>
        <div class="progress-bg"><div id="p-fill" class="progress-fill"></div></div>
    </div>

    <div id="preview"></div>
    <a href="https://easyusehub.blogspot.com" class="home-btn">🏠 Back to Home</a>
</div>

<div class="ad-slot">ADVERTISEMENT SLOT (BOTTOM)</div>

<script>
let imgData = null;

document.getElementById('fileInp').onchange = function(e) {
    const file = e.target.files[0];
    if (file) {
        if (file.size > 15 * 1024 * 1024) {
            alert("Limit: 15MB. Please choose a smaller file.");
            return;
        }
        imgData = file;
        document.getElementById('status').innerText = file.name;
        document.getElementById('oldS').innerText = (file.size > 1024 * 1024) ? (file.size / (1024 * 1024)).toFixed(2) + " MB" : (file.size / 1024).toFixed(1) + " KB";
        document.getElementById('stats-box').style.display = 'grid';
        document.getElementById('runBtn').style.display = 'block';
        document.getElementById('preview').innerHTML = '';
        document.getElementById('progress-container').style.display = 'none';
    }
};

async function processImage() {
    const targetKB = parseFloat(document.getElementById('targetKB').value);
    const pFill = document.getElementById('p-fill');
    const pLabel = document.getElementById('p-label');
    const runBtn = document.getElementById('runBtn');

    document.getElementById('progress-container').style.display = 'block';
    runBtn.style.display = 'none';
    
    updateP(20, "Analyzing Image...");

    const reader = new FileReader();
    reader.readAsArrayBuffer(imgData);
    reader.onload = function(event) {
        const blob = new Blob([event.target.result]);
        const url = URL.createObjectURL(blob);
        const img = new Image();
        img.src = url;

        img.onload = async () => {
            updateP(50, "Downsizing Pixels...");
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            // Hard resolution limit to prevent crash
            let width = img.width;
            let height = img.height;
            let maxDimension = 1000; 
            
            if (imgData.size > 5 * 1024 * 1024) maxDimension = 800; // 5MB+ হলে রেজোলিউশন আরও কমাবে

            if (width > maxDimension || height > maxDimension) {
                const ratio = Math.min(maxDimension / width, maxDimension / height);
                width = width * ratio;
                height = height * ratio;
            }

            canvas.width = width;
            canvas.height = height;
            ctx.drawImage(img, 0, 0, width, height);
            
            updateP(80, "Compressing...");
            
            // Single step compression for speed and stability
            let quality = 0.6;
            if (imgData.size > 5 * 1024 * 1024) quality = 0.4;
            
            canvas.toBlob(async (finalBlob) => {
                updateP(100, "Success!");
                
                const finalSize = finalBlob.size / 1024;
                document.getElementById('newS').innerText = (finalSize > 1024) ? (finalSize / 1024).toFixed(2) + " MB" : finalSize.toFixed(1) + " KB";
                
                const finalUrl = URL.createObjectURL(finalBlob);
                document.getElementById('preview').innerHTML = `<img src="${finalUrl}"><a href="${finalUrl}" download="EasyUseHub_${imgData.name}" class="download-btn">Download Now</a>`;
                document.getElementById('progress-container').style.display = 'none';
                
                // Cleanup
                URL.revokeObjectURL(url);
            }, 'image/jpeg', quality);
        };
    };
}

function updateP(pct, txt) {
    document.getElementById('p-fill').style.width = pct + "%";
    document.getElementById('p-label').innerText = txt + " (" + pct + "%)";
}
</script>
</body>
</html>
