<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Image Compressor - EasyUseHub</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
body{font-family:'Roboto',sans-serif;margin:0;background:#f8fafc;color:#1e293b;display:flex;flex-direction:column;min-height:100vh}
header{text-align:center;padding:15px;background:#fff;border-bottom:2px solid #3b82f6}
header img{max-width:160px}
#main-tool{flex:1;padding:15px;max-width:480px;margin:0 auto;width:100%;box-sizing:border-box}
.tool-card{background:#fff;padding:25px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.08);text-align:center}
.upload-zone{border:2px dashed #3b82f6;padding:35px 15px;border-radius:15px;cursor:pointer;background:#f0f7ff;margin-bottom:20px}
.upload-zone input{display:none}
.upload-label{background:#3b82f6;color:#fff;padding:12px 25px;border-radius:10px;font-weight:700;display:inline-block;margin-bottom:10px}
.size-info{background:#f1f5f9; padding:15px; border-radius:12px; margin-bottom:15px; display:none; text-align:left; font-size:14px;}
.size-info div{margin:5px 0; font-weight:bold;}
.primary-btn{width:100%;padding:16px;background:#22c55e;color:#fff;border:none;border-radius:12px;font-size:18px;font-weight:700;cursor:pointer;display:none}
#loader{margin:15px 0;font-weight:700;color:#3b82f6;display:none}
#preview-area img{max-width:100%;border-radius:12px;margin-top:20px;border:1px solid #e2e8f0}
.download-btn{display:block;background:#1e293b;color:#fff;text-decoration:none;padding:15px;border-radius:12px;font-weight:700;margin-top:10px;text-align:center}
footer{text-align:center;padding:25px;background:#fff;border-top:1px solid #e2e8f0;margin-top:auto}
.home-link{display:inline-block;padding:12px 30px;background:#3b82f6;color:#fff;text-decoration:none;border-radius:30px;font-weight:700}
</style>
</head>
<body>

<header><img src="https://i.ibb.co.com/21CVbgH5/1000036310-removebg-preview-1.png" alt="EasyUseHub Logo"></header>

<div id="main-tool">
    <div class="tool-card">
        <div class="upload-zone" onclick="document.getElementById('fileInp').click()">
            <span class="upload-label">Select Photo</span>
            <input type="file" id="fileInp" accept="image/*">
            <div id="file-status">Click to upload image</div>
        </div>

        <div id="infoBox" class="size-info">
            <div style="color:#64748b;">Original: <span id="oldSize">0 KB</span></div>
            <div style="color:#22c55e;">Optimized: <span id="newSize">Processing...</span></div>
        </div>

        <button id="mainBtn" class="primary-btn" onclick="startOptimizing()">⚡ Compress Now</button>
        <div id="loader">Processing... Please Wait</div>
        <div id="preview-area"></div>
    </div>
</div>

<footer>
    <a href="https://easyusehub.blogspot.com" class="home-link">🏠 Back to Home</a>
</footer>

<script>
let imgFile = null;

document.getElementById('fileInp').onchange = function(e) {
    if(this.files.length > 0) {
        imgFile = this.files[0];
        document.getElementById('file-status').innerText = imgFile.name;
        document.getElementById('oldSize').innerText = (imgFile.size / 1024).toFixed(1) + " KB";
        document.getElementById('infoBox').style.display = 'block';
        document.getElementById('mainBtn').style.display = 'block';
        document.getElementById('preview-area').innerHTML = '';
        document.getElementById('newSize').innerText = "Waiting...";
    }
};

async function startOptimizing() {
    if(!imgFile) return;
    const loader = document.getElementById('loader');
    const preview = document.getElementById('preview-area');
    const newSizeTxt = document.getElementById('newSize');
    
    loader.style.display = 'block';
    preview.innerHTML = '';
    newSizeTxt.innerText = "Squeezing...";

    const img = new Image();
    const reader = new FileReader();
    
    reader.onload = (e) => {
        img.src = e.target.result;
        img.onload = async () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            // --- FORCE COMPRESSION LOGIC ---
            let width = img.width;
            let height = img.height;
            let quality = 0.6; // Start quality

            // 1. Jodi chobi beshi boro hoy (1200px limit)
            if (width > 1200 || height > 1200) {
                const ratio = Math.min(1200 / width, 1200 / height);
                width *= ratio; height *= ratio;
            }

            // 2. Jodi size na kome, tobe width/height aro komabe (Looping)
            let finalBlob = null;
            for (let i = 0; i < 3; i++) {
                canvas.width = width;
                canvas.height = height;
                ctx.drawImage(img, 0, 0, width, height);
                
                finalBlob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', quality));
                
                // Jodi size original er theke 20% kom hoy, tobe theme jabe
                if (finalBlob.size < imgFile.size * 0.8) break; 
                
                // Noile aro komabe
                width *= 0.8; height *= 0.8; quality -= 0.1;
            }

            const url = URL.createObjectURL(finalBlob);
            loader.style.display = 'none';
            newSizeTxt.innerText = (finalBlob.size / 1024).toFixed(1) + " KB";
            
            preview.innerHTML = `
                <img src="${url}">
                <a href="${url}" download="Compressed_${imgFile.name}" class="download-btn">Download Image</a>
            `;
            document.getElementById('fileInp').value = ""; 
        };
    };
    reader.readAsDataURL(imgFile);
}
</script>
</body>
</html>
