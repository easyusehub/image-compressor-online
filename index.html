    <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Custom KB Compressor - EasyUseHub</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pica/9.0.1/pica.min.js"></script>
<style>
body{font-family:'Roboto',sans-serif; background:#f4f7f6; margin:0; padding:0; color:#1e293b; text-align:center;}
header{padding:15px; background:#fff; border-bottom:2px solid #3b82f6;}
header img{max-width:160px;}
.ad-container{margin:10px auto; padding:10px; background:#e2e8f0; border:1px dashed #94a3b8; max-width:600px; border-radius:8px; font-size:11px; color:#64748b;}
.container{max-width:450px; margin:10px auto; background:#fff; padding:25px; border-radius:20px; box-shadow:0 10px 25px rgba(0,0,0,0.05);}
.upload-box{border:2px dashed #3b82f6; padding:30px 10px; border-radius:15px; cursor:pointer; background:#f0f7ff; margin-bottom:20px;}
#file-status{font-weight:bold; color:#3b82f6; margin-top:8px; font-size:14px;}
.control-group{margin-bottom:20px; text-align: left;}
.control-group label{display:block; font-size:14px; font-weight: bold; margin-bottom: 8px; color:#475569;}
select{width:100%; padding:14px; border:2px solid #e2e8f0; border-radius:12px; font-size:16px; background:#fff; cursor:pointer; outline:none;}
.stats{background:#f8fafc; padding:15px; border-radius:12px; margin-bottom:15px; display:none; text-align:left; border:1px solid #e2e8f0;}
.stats div{margin:5px 0; font-size:14px; font-weight:bold;}
.btn{width:100%; padding:16px; background:#22c55e; color:#fff; border:none; border-radius:12px; font-size:18px; font-weight:bold; cursor:pointer; display:none;}
#loader{display:none; margin:15px 0; color:#3b82f6; font-weight:bold;}
#preview img{max-width:150px; border-radius:12px; margin-top:20px; border:1px solid #ddd;}
.download-link{display:block; margin-top:12px; background:#1e293b; color:#fff; padding:15px; border-radius:12px; text-decoration:none; font-weight:bold;}
footer{padding:20px; color:#94a3b8; font-size:11px;}
</style>
</head>
<body>

<header><img src="https://i.ibb.co.com/21CVbgH5/1000036310-removebg-preview-1.png" alt="EasyUseHub Logo"></header>

<div class="ad-container">AD SLOT 1 (TOP)</div>

<div class="container">
    <div class="upload-box" onclick="document.getElementById('inp').click()">
        <div style="background:#3b82f6; color:#fff; padding:10px 20px; border-radius:8px; display:inline-block; font-weight:bold;">Select Photo</div>
        <input type="file" id="inp" accept="image/*" style="display:none">
        <div id="file-status">Fast KB-Target Compression</div>
    </div>

    <div class="control-group">
        <label>Select Your Target Size:</label>
        <select id="targetKB">
            <option value="40">Under 40 KB (Smallest)</option>
            <option value="100">Under 100 KB (Recommended)</option>
            <option value="200">Under 200 KB</option>
            <option value="500">Under 500 KB</option>
            <option value="1024">Under 1 MB (1024 KB)</option>
        </select>
    </div>

    <div id="stats" class="stats">
        <div style="color:#64748b;">Original Size: <span id="oldS">0</span> KB</div>
        <div style="color:#22c55e;">Target Size: <span id="targetShow">40</span> KB</div>
    </div>

    <button id="runBtn" class="btn" onclick="startCompression()">⚡ Optimize to Target KB</button>
    <div id="loader">⚙️ Engine Running... Please Wait</div>
    <div id="preview"></div>
</div>

<div class="ad-container">AD SLOT 2 (BOTTOM)</div>

<footer>
    <a href="https://easyusehub.blogspot.com" style="color:#3b82f6; text-decoration:none; font-weight:bold;">🏠 Back to EasyUseHub</a>
    <p>&copy; 2026 EasyUseHub | KB-Master Engine</p>
</footer>

<script>
const pica = window.pica();
let activeFile = null;

document.getElementById('inp').onchange = function(e) {
    if(this.files.length > 0) {
        activeFile = this.files[0];
        document.getElementById('file-status').innerText = activeFile.name;
        document.getElementById('oldS').innerText = (activeFile.size / 1024).toFixed(1);
        document.getElementById('stats').style.display = 'block';
        document.getElementById('runBtn').style.display = 'block';
        document.getElementById('preview').innerHTML = '';
    }
};

document.getElementById('targetKB').onchange = function() {
    document.getElementById('targetShow').innerText = this.value;
};

async function startCompression() {
    const loader = document.getElementById('loader');
    const runBtn = document.getElementById('runBtn');
    const preview = document.getElementById('preview');
    const targetLimit = parseFloat(document.getElementById('targetKB').value);
    
    loader.style.display = 'block';
    runBtn.style.display = 'none';

    const img = new Image();
    const objUrl = URL.createObjectURL(activeFile);
    img.src = objUrl;

    img.onload = async () => {
        let width = img.width;
        let height = img.height;
        
        // টার্গেট সাইজ ছোট হলে রেজোলিউশন আগে থেকেই কমিয়ে আনা
        let maxDim = targetLimit < 100 ? 800 : 1600;
        let ratio = Math.min(maxDim / width, maxDim / height, 1);
        width *= ratio;
        height *= ratio;

        const fromCanvas = document.createElement('canvas');
        fromCanvas.width = img.width;
        fromCanvas.height = img.height;
        fromCanvas.getContext('2d').drawImage(img, 0, 0);

        let finalBlob = null;
        let quality = 0.8;

        // --- MASTER LOOP: টার্গেট সাইজ না আসা পর্যন্ত ১৫ বার ট্রাই করবে ---
        for (let i = 0; i < 15; i++) {
            const toCanvas = document.createElement('canvas');
            toCanvas.width = width;
            toCanvas.height = height;

            await pica.resize(fromCanvas, toCanvas);
            finalBlob = await pica.toBlob(toCanvas, 'image/jpeg', quality);

            if (finalBlob.size / 1024 <= targetLimit) break;

            // যদি সাইজ টার্গেটের চেয়ে বড় হয়, তবে কোয়ালিটি ও সাইজ কমানো হবে
            quality -= 0.1;
            width *= 0.9;
            height *= 0.9;
            if (quality < 0.1) quality = 0.1;
        }

        const url = URL.createObjectURL(finalBlob);
        loader.style.display = 'none';
        preview.innerHTML = `
            <div style="font-weight:bold; color:#22c55e; margin:12px 0;">✅ Done! New Size: ${(finalBlob.size/1024).toFixed(1)} KB</div>
            <img src="${url}">
            <a href="${url}" download="EasyUseHub_${activeFile.name}" class="download-link">Download Compressed Image</a>
        `;
        URL.revokeObjectURL(objUrl);
    };
}
</script>
</body>
</html>
