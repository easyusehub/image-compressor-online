            <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Image Compressor - EasyUseHub</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
/* তোর অরিজিনাল ব্লু-গ্রিন প্রফেশনাল থিম */
body{font-family:'Roboto',sans-serif;margin:0;background:#f4f7f6;color:#1e293b;display:flex;flex-direction:column;min-height:100vh}
header{text-align:center;padding:15px;background:#fff;border-bottom:2px solid #3b82f6}
header img{max-width:180px}
.ad-slot{text-align:center;margin:10px auto;padding:10px;background:#e2e8f0;border-radius:8px;font-size:11px;max-width:600px;color:#64748b;border:1px dashed #94a3b8}
#main-tool{flex:1;padding:15px;max-width:500px;margin:0 auto;width:100%;box-sizing:border-box}
.tool-card{background:#fff;padding:25px;border-radius:15px;box-shadow:0 10px 25px rgba(0,0,0,0.05);text-align:center}
.upload-zone{border:2px dashed #3b82f6;padding:35px 15px;border-radius:12px;cursor:pointer;background:#f0f7ff;transition:0.3s;margin-bottom:15px}
.upload-zone:hover{background:#e0eeff}
.upload-zone input{display:none}
.upload-label{background:#3b82f6;color:#fff;padding:12px 25px;border-radius:8px;font-weight:700;display:inline-block;margin-bottom:10px}
#file-status{font-size:13px;color:#3b82f6;font-weight:500}
/* এরর মেসেজ স্টাইল */
.error-msg{color:#ef4444;font-weight:bold;margin-top:10px;display:none;font-size:13px}
.presets{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:15px 0}
.presets button{padding:10px;border:none;border-radius:6px;background:#3b82f6;color:#fff;font-weight:700;cursor:pointer;font-size:13px}
.custom-box input{padding:12px;border:1px solid #cbd5e1;border-radius:8px;width:130px;text-align:center;font-size:16px;margin-bottom:10px}
.primary-btn{width:100%;padding:15px;background:#22c55e;color:#fff;border:none;border-radius:10px;font-size:17px;font-weight:700;cursor:pointer;transition:0.3s}
.primary-btn:hover{background:#16a34a}
#loader{margin:15px 0;font-weight:700;color:#3b82f6;display:none}
#preview-area img{max-width:100%;border-radius:10px;margin-top:15px;border:1px solid #e2e8f0}
.download-btn{display:block;background:#1e293b;color:#fff;text-decoration:none;padding:15px;border-radius:10px;font-weight:700;margin-top:10px;text-align:center}
footer{text-align:center;padding:20px;background:#fff;border-top:1px solid #e2e8f0;margin-top:auto}
.home-link{display:inline-block;padding:10px 30px;background:#3b82f6;color:#fff;text-decoration:none;border-radius:30px;font-weight:700;font-size:14px}
</style>
</head>
<body>

<header><img src="https://i.ibb.co.com/21CVbgH5/1000036310-removebg-preview-1.png" alt="EasyUseHub Logo"></header>
<div class="ad-slot">AD SLOT 1 (TOP)</div>

<div id="main-tool">
    <div class="tool-card">
        <div class="upload-zone" onclick="document.getElementById('fileInp').click()">
            <span class="upload-label">Upload Image</span>
            <input type="file" id="fileInp" accept="image/*">
            <div id="file-status">Min 50KB - Max 50MB</div>
            <div id="error-display" class="error-msg">❌ Error: Image must be at least 50KB!</div>
        </div>

        <div class="presets">
            <button onclick="setTarget(50)">50 KB</button>
            <button onclick="setTarget(100)">100 KB</button>
            <button onclick="setTarget(200)">200 KB</button>
            <button onclick="setTarget(500)">500 KB</button>
            <button onclick="setTarget(1024)">1 MB</button>
            <button onclick="setTarget(2048)" style="background:#1e293b">2 MB</button>
        </div>

        <div class="custom-box">
            <input type="number" id="targetKB" placeholder="Target KB">
            <button class="primary-btn" onclick="startCompression()">Compress & Download</button>
        </div>

        <div id="loader">⚡ Optimizing... Please wait</div>
        <div id="preview-area"></div>
    </div>
</div>

<div class="ad-slot">AD SLOT 2 (BOTTOM)</div>

<footer>
    <a href="https://easyusehub.blogspot.com" class="home-link">🏠 Back to Home</a>
    <p style="font-size:11px;color:#94a3b8;margin-top:15px">&copy; 2026 EasyUseHub | Professional Engine</p>
</footer>

<script>
let currentFile = null;

document.getElementById('fileInp').onchange = function(e) {
    const errorDisplay = document.getElementById('error-display');
    const fileStatus = document.getElementById('file-status');
    const previewArea = document.getElementById('preview-area');
    
    if(this.files.length > 0) {
        const file = this.files[0];
        const fileSizeKB = file.size / 1024;

        // ৫০KB-র নিচে হলে এরর দিবে
        if(fileSizeKB < 50) {
            errorDisplay.style.display = 'block';
            fileStatus.innerText = "Invalid File Size";
            currentFile = null;
            this.value = ""; // ক্লিয়ার করে দিবে
            previewArea.innerHTML = '';
            return;
        }

        // সব ঠিক থাকলে লোড করবে
        errorDisplay.style.display = 'none';
        currentFile = file;
        fileStatus.innerText = `Selected: ${currentFile.name} (${fileSizeKB.toFixed(1)} KB)`;
        previewArea.innerHTML = ''; 
        document.getElementById('loader').style.display = 'none';
    }
};

function setTarget(kb) { document.getElementById('targetKB').value = kb; }

async function startCompression() {
    const targetKB = parseFloat(document.getElementById('targetKB').value);
    if(!currentFile) { alert("Please select a valid image (Min 50KB)!"); return; }
    if(!targetKB) { alert("Enter target size!"); return; }
    
    const loader = document.getElementById('loader');
    const preview = document.getElementById('preview-area');
    loader.style.display = 'block';
    preview.innerHTML = '';

    const img = new Image();
    const reader = new FileReader();
    
    reader.onload = function(event) {
        img.src = event.target.result;
        img.onload = async () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            let width = img.width;
            let height = img.height;

            // অ্যাডভান্সড স্কেলিং
            let maxDim = 2000;
            if(currentFile.size > 20 * 1024 * 1024) maxDim = 1500;
            
            let scale = Math.min(maxDim / width, maxDim / height, 1);
            width *= scale;
            height *= scale;

            canvas.width = width;
            canvas.height = height;
            ctx.drawImage(img, 0, 0, width, height);

            let mimeType = currentFile.type === "image/png" ? "image/png" : "image/jpeg";
            let low = 0.01, high = 0.98, bestBlob = null;

            // ১০ ধাপের নিখুঁত বাইনারি সার্চ
            for (let i = 0; i < 10; i++) {
                const mid = (low + high) / 2;
                const blob = await new Promise(r => canvas.toBlob(r, mimeType, mid));
                if (blob.size / 1024 <= targetKB) {
                    low = mid;
                    bestBlob = blob;
                } else {
                    high = mid;
                }
            }

            if(!bestBlob) bestBlob = await new Promise(r => canvas.toBlob(r, mimeType, 0.5));

            const resultUrl = URL.createObjectURL(bestBlob);
            loader.style.display = 'none';
            preview.innerHTML = `
                <div style="font-weight:700;color:#22c55e;margin-bottom:10px">✅ Done! Size: ${(bestBlob.size/1024).toFixed(1)} KB</div>
                <img src="${resultUrl}">
                <a href="${resultUrl}" download="EasyUseHub_${currentFile.name}" class="download-btn">Download Image</a>
            `;
            document.getElementById('fileInp').value = ""; 
        };
    };
    reader.readAsDataURL(currentFile);
}
</script>
</body>
</html>
