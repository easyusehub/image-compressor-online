<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EasyUseHub - Turbo Image Compressor</title>
<style>
body{font-family:sans-serif; background:#f4f7f6; margin:0; padding:20px; text-align:center; color:#1e293b;}
.container{max-width:450px; margin:0 auto; background:#fff; padding:25px; border-radius:20px; box-shadow:0 10px 25px rgba(0,0,0,0.1);}
header img{max-width:150px; margin-bottom:15px;}
.upload-area{border:2px dashed #3b82f6; padding:30px; border-radius:15px; cursor:pointer; background:#f0f7ff; margin-bottom:20px;}
.btn{width:100%; padding:15px; background:#22c55e; color:#fff; border:none; border-radius:12px; font-size:18px; font-weight:bold; cursor:pointer; margin-top:10px;}
select{width:100%; padding:12px; margin:10px 0; border-radius:10px; border:2px solid #e2e8f0; font-size:16px;}
#loader{display:none; color:#3b82f6; font-weight:bold; margin:20px 0;}
#preview img{max-width:100%; border-radius:12px; margin-top:20px; border:1px solid #ddd;}
.download-btn{display:block; margin-top:15px; background:#1e293b; color:#fff; padding:15px; border-radius:10px; text-decoration:none; font-weight:bold;}
.home-btn{display:inline-block; margin-top:20px; color:#3b82f6; text-decoration:none; font-weight:bold;}
</style>
</head>
<body>

<div class="container">
    <header><img src="https://i.ibb.co.com/21CVbgH5/1000036310-removebg-preview-1.png" alt="Logo"></header>
    
    <div class="upload-area" onclick="document.getElementById('fileInp').click()">
        <strong>Click to Select Image</strong>
        <input type="file" id="fileInp" accept="image/*" style="display:none">
        <div id="status" style="margin-top:10px; font-size:13px; color:#3b82f6;">Select any image (Max 1MB)</div>
    </div>

    <label style="display:block; text-align:left; font-weight:bold; font-size:14px;">Target Size:</label>
    <select id="targetKB">
        <option value="40">Under 40 KB</option>
        <option value="100">Under 100 KB</option>
        <option value="200">Under 200 KB</option>
        <option value="500">Under 500 KB</option>
    </select>

    <button id="runBtn" class="btn" style="display:none;" onclick="compressImage()">⚡ Compress & Download</button>
    <div id="loader">🚀 Processing... Please Wait</div>
    <div id="preview"></div>

    <a href="https://easyusehub.blogspot.com" class="home-btn">🏠 Back to Home</a>
</div>

<script>
let selectedFile = null;

document.getElementById('fileInp').onchange = function(e) {
    if(this.files.length > 0) {
        selectedFile = this.files[0];
        document.getElementById('status').innerText = "Selected: " + selectedFile.name;
        document.getElementById('runBtn').style.display = 'block';
        document.getElementById('preview').innerHTML = '';
    }
};

async function compressImage() {
    const loader = document.getElementById('loader');
    const runBtn = document.getElementById('runBtn');
    const preview = document.getElementById('preview');
    const targetKB = parseFloat(document.getElementById('targetKB').value);

    loader.style.display = 'block';
    runBtn.style.display = 'none';

    const img = new Image();
    img.src = URL.createObjectURL(selectedFile);

    img.onload = async () => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');

        // Initial Resolution Reduction
        let width = img.width;
        let height = img.height;
        const maxDim = 800; // রেজোলিউশন লিমিট কমিয়ে দিলাম যাতে ব্রাউজার ক্রাশ না করে
        if (width > maxDim || height > maxDim) {
            const ratio = Math.min(maxDim / width, maxDim / height);
            width *= ratio;
            height *= ratio;
        }

        canvas.width = width;
        canvas.height = height;
        ctx.drawImage(img, 0, 0, width, height);

        // Binary Search Quality Compression
        let minQ = 0.1, maxQ = 0.9, bestBlob = null;
        
        for(let i=0; i<6; i++) { // ৬ বার লুপ চালিয়ে সবথেকে কাছের সাইজ বের করবে
            let midQ = (minQ + maxQ) / 2;
            const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', midQ));
            
            if (blob.size / 1024 <= targetKB) {
                bestBlob = blob;
                minQ = midQ; // সাইজ ছোট হলে কোয়ালিটি একটু বাড়ানোর চেষ্টা করবে
            } else {
                maxQ = midQ; // সাইজ বড় হলে কোয়ালিটি আরও কমাবে
            }
        }

        // যদি লুপে রেজাল্ট না আসে, তবে একদম মিনিমাম কোয়ালিটি দিবে
        if(!bestBlob) {
            bestBlob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.1));
        }

        const url = URL.createObjectURL(bestBlob);
        loader.style.display = 'none';
        preview.innerHTML = `
            <div style="font-weight:bold; color:#22c55e; margin:10px 0;">New Size: ${(bestBlob.size/1024).toFixed(1)} KB</div>
            <img src="${url}">
            <a href="${url}" download="EasyUseHub_Compressed.jpg" class="download-btn">Download Now</a>
        `;
    };
}
</script>
</body>
</html>
